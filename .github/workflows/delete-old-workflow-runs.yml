name: Delete old workflow runs
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'
# Run weekly, at 00:00 on Monday.

jobs:
  del_runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write            # changed from read -> write
    steps:
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 7
          keep_minimum_runs: 5

      - name: Checkout repository
        if: github.event_name == 'schedule'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🚗 Keep Running
        if: github.event_name == 'schedule'
        run: |
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git config user.name "${{ github.actor }}"
          # Use token-authenticated remote URL for pushing
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          # Ensure we are on a branch (the checkout step usually checks out the default branch)
          git pull --rebase --autostash || true
          git commit --allow-empty -m "Keep Running..."
          git push origin HEAD
